spring.application.name=spring-ai-tutorial
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=8080

# OpenAI API Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.embedding.options.model=text-embedding-3-small

# Qdrant VectorStore Configuration
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=documents
spring.ai.vectorstore.qdrant.initialize-schema=true
spring.ai.vectorstore.qdrant.dimensions=1536

# File Upload Settings
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs


logging.level.com.example.spring_ai_tutorial=DEBUG